<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Guardian — Link Your Account</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #444;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background-color: #3b5de7;
        }

        button:active {
            background-color: #2f4ed6;
        }

        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Voice Guardian</h1>
        <p class="subtitle">Link your account to Alexa</p>

        <div id="error-message" class="error-message"></div>

        <form id="link-form" method="POST" action="/oauth/authorize">
            <div class="form-group">
                <label for="home_id">Home ID</label>
                <input type="text" id="home_id" name="home_id" required
                       placeholder="Enter your Home ID" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="pin">PIN</label>
                <input type="password" id="pin" name="pin" required
                       placeholder="Enter your PIN" maxlength="10">
            </div>

            <input type="hidden" id="redirect_uri" name="redirect_uri" value="">
            <input type="hidden" id="state" name="state" value="">

            <button type="submit">Link Account</button>
        </form>
    </div>

    <script>
        // Populate hidden fields from URL query parameters
        (function() {
            var params = new URLSearchParams(window.location.search);
            var redirectUri = params.get('redirect_uri') || '';
            var state = params.get('state') || '';

            document.getElementById('redirect_uri').value = redirectUri;
            document.getElementById('state').value = state;
        })();
    </script>
</body>
</html>
